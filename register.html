<script>
function register() {
    var user = document.getElementById("newUser").value.trim();
    var pass = document.getElementById("newPass").value.trim();
    var gender = document.getElementById("gender").value;
    var birthday = document.getElementById("birthday").value;
    var nationality = document.getElementById("nationality").value.trim();
    var message = document.getElementById("message");

    if (user === "" || pass === "" || gender === "" || birthday === "" || nationality === "") {
        message.innerText = "Fill all fields!";
        message.className = "error";
        return;
    }

    if (
        pass.length < 6 ||
        !/[a-z]/.test(pass) ||
        !/[A-Z]/.test(pass) ||
        !/[0-9]/.test(pass) ||
        !/[!@#$%^&*]/.test(pass)
    ) {
        message.innerText = "Password must include upper case, lower case, number and symbol!";
        message.className = "error";
        return;
    }

    localStorage.setItem("savedUser", user);
    localStorage.setItem("savedPass", pass);
    localStorage.setItem("gender", gender);
    localStorage.setItem("birthday", birthday);
    localStorage.setItem("nationality", nationality);

    message.innerText = "Account created! Redirecting...";
    message.className = "success";

    setTimeout(function(){ window.location.href = "index.html"; }, 1500);
}
</script>
